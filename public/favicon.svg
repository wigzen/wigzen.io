<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <style>
      .bg   { fill: #1c1917; }
      .br   { fill: #f0ede8; }
      .sl   { fill: #a8ff51; }
      @media (prefers-color-scheme: light) {
        .bg { fill: #f0ede8; }
        .br { fill: #1c1917; }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" width="32" height="32" rx="6"/>

  <!-- Left bracket < -->
  <!-- top arm -->
  <rect class="br" x="6" y="10" width="7" height="2" rx="0.5"
        transform="rotate(35 9.5 11)"/>
  <!-- bottom arm -->
  <rect class="br" x="6" y="20" width="7" height="2" rx="0.5"
        transform="rotate(-35 9.5 21)"/>

  <!-- Slash / (neon) -->
  <rect class="sl" x="14.5" y="8" width="2.5" height="16" rx="0.5"
        transform="rotate(-15 15.75 16)"/>

  <!-- Right bracket > -->
  <!-- top arm -->
  <rect class="br" x="19" y="10" width="7" height="2" rx="0.5"
        transform="rotate(-35 22.5 11)"/>
  <!-- bottom arm -->
  <rect class="br" x="19" y="20" width="7" height="2" rx="0.5"
        transform="rotate(35 22.5 21)"/>
</svg>
